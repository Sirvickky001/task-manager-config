replicaCount: 2

image:
  repository: ghcr.io/sirvickky001/taskflow
  tag: sha-broken
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  host: taskflow.local

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

env:
  NODE_ENV: production
